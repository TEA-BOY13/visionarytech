<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Signup</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(120deg,#0f2027,#203a43,#2c5364);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

#signupBox{
background:#111;
padding:30px;
border-radius:10px;
width:320px;
box-shadow:0 0 10px rgba(0,0,0,0.6);
}

h2{
text-align:center;
margin-bottom:20px;
}

input,select,button{
width:100%;
padding:10px;
margin:8px 0;
border:none;
border-radius:6px;
}

input,select{
background:#f1f1f1;
color:black;
}

button{
background:#2563eb;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

</style>
</head>

<body>

<div id="signupBox">

<h2>Student Signup</h2>

<input type="text" id="name" placeholder="Full Name">

<input type="text" id="studentId" placeholder="Student ID">

<input type="email" id="email" placeholder="Email">

<select id="virtualChoice">
<option value="">Virtual Interface?</option>
<option value="yes">Yes</option>
<option value="no">No</option>
</select>

<input type="password" id="password" placeholder="Password">

<input type="password" id="confirmPassword" placeholder="Confirm Password">

<button onclick="signup()">Create Account</button>

</div>


<!-- SweetAlert -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>


<script>

/* FIREBASE CONFIG */

const firebaseConfig={
apiKey:"AIzaSyBbXGnrJZd6sh48qBaMJFojs0tQR571nsE",
authDomain:"rtvoicet.firebaseapp.com",
databaseURL:"https://rtvoicet-default-rtdb.firebaseio.com",
projectId:"rtvoicet",
storageBucket:"rtvoicet.firebasestorage.app",
messagingSenderId:"574390825166",
appId:"1:574390825166:web:29a4368f3d7829fa01a09f"
}

firebase.initializeApp(firebaseConfig)

const auth=firebase.auth()
const db=firebase.database()



function signup(){

const name=document.getElementById("name").value
const studentId=document.getElementById("studentId").value
const email=document.getElementById("email").value
const password=document.getElementById("password").value
const confirmPassword=document.getElementById("confirmPassword").value
const virtualChoice=document.getElementById("virtualChoice").value



/* CHECK EMPTY */

if(name===""||studentId===""||email===""||password===""||confirmPassword===""||virtualChoice===""){

Swal.fire({
icon:'warning',
title:'Missing Fields',
text:'Please fill all fields'
})

return

}


/* PASSWORD MATCH */

if(password!==confirmPassword){

Swal.fire({
icon:'error',
title:'Password Error',
text:'Passwords do not match'
})

return

}



/* CREATE ACCOUNT */

auth.createUserWithEmailAndPassword(email,password)

.then((userCredential)=>{

const user=userCredential.user



/* SAVE DATA */

db.ref("students/"+user.uid).set({

name:name,
studentId:studentId,
email:email,
virtual:virtualChoice

})



Swal.fire({
icon:'success',
title:'Account Created!',
text:'Your account has been successfully created',
confirmButtonText:'Continue'
}).then(()=>{

/* REDIRECT */

if(virtualChoice==="yes"){

window.location.href="vstudent.html"

}else{

window.location.href="students.html"

}

})


})

.catch((error)=>{

Swal.fire({
icon:'error',
title:'Signup Failed',
text:error.message
})

})

}

</script>

</body>
</html>
